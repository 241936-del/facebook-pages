<!DOCTYPE html>
<html>
<head>
    <title>Facebook – Login</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

<div class="container">
    <div class="row justify-content-center align-items-center vh-100">

        <div class="col-md-6 text-center text-md-start mb-4">
            <h1 class="fb-logo">facebook</h1>
            <p class="lead">Connect with friends and the world around you.</p>
        </div>

        <div class="col-md-5">
            <div class="card shadow-lg p-4 login-card">

                <form>
                    <input type="email" class="form-control mb-3" placeholder="Email or phone number">

                    <input type="password" class="form-control mb-3" placeholder="Password">

                    <button class="btn btn-primary w-100 mb-3">Log In</button>

                    <div class="text-center mb-3">
                        <a href="#" class="text-decoration-none">Forgot password?</a>
                    </div>

                    <hr>

                    <div class="text-center">
                        <button class="btn btn-success px-4">Create New Account</button>
                    </div>

                </form>

            </div>
        </div>

    </div>
</div>

</body>
</html>
