<!DOCTYPE html>
<html>
<head>
    <title>Facebook – Home</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body class="home-body">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary px-4">
    <a class="navbar-brand fw-bold" href="#">facebook</a>

    <form class="d-flex ms-3">
        <input class="form-control" type="search" placeholder="Search Facebook">
    </form>

    <div class="ms-auto text-white">
        <span class="me-3">Home</span>
        <span class="me-3">Profile</span>
        <span>Logout</span>
    </div>
</nav>

<div class="container-fluid mt-4">
    <div class="row">

        <!-- Left Sidebar -->
        <div class="col-md-3">
            <div class="card p-3 shadow-sm mb-3">
                <h6>Your Profile</h6>
                <p>BSCS Student</p>
            </div>

            <div class="card p-3 shadow-sm">
                <p>Friends</p>
                <p>Groups</p>
                <p>Marketplace</p>
            </div>
        </div>

        <!-- Main Feed -->
        <div class="col-md-6">
            <div class="card p-3 shadow-sm mb-3">
                <input type="text" class="form-control mb-2" placeholder="What's on your mind?">
                <button class="btn btn-primary w-100">Post</button>
            </div>

            <div class="card p-3 shadow-sm mb-3">
                <h6>John Doe</h6>
                <p>Hello everyone! This is my first post 🎉</p>
            </div>

            <div class="card p-3 shadow-sm">
                <h6>Jane Smith</h6>
                <p>Enjoying web development with Bootstrap!</p>
            </div>
        </div>

        <!-- Right Sidebar -->
        <div class="col-md-3">
            <div class="card p-3 shadow-sm">
                <h6>Contacts</h6>
                <p>Ali</p>
                <p>Ahmed</p>
                <p>Sara</p>
            </div>
        </div>

    </div>
</div>

</body>
</html>
